        - sql:
            sql: UPDATE STM_SEQUENCE SET SEQ_COUNT = SEQ_COUNT + 1 WHERE SEQ_NAME = 'COD_ID';

  - changeSet:
      id: 10
      author: sitmun
      changes:
        - sql:
            sql: UPDATE STM_SEQUENCE SET SEQ_COUNT = SEQ_COUNT + 1 WHERE SEQ_NAME = 'TUI_ID';
        - insert:
            tableName: STM_TSK_UI
            columns:
              - column:
                  name: TUI_ID
                  valueComputed: COALESCE((SELECT SEQ_COUNT FROM STM_SEQUENCE WHERE SEQ_NAME = 'TUI_ID'), 40)
              - column:
                  name: TUI_NAME
                  value: "sitna.moreInfo"
              - column:
                  name: TUI_TOOLTIP
                  value: "More Info"
              - column:
                  name: TUI_TYPE
                  value: null
              - column:
                  name: TUI_ORDER
                  valueComputed: COALESCE((SELECT SEQ_COUNT FROM STM_SEQUENCE WHERE SEQ_NAME = 'TUI_ID'), 40)

        - sql:
            sql: UPDATE STM_SEQUENCE SET SEQ_COUNT = SEQ_COUNT + 1 WHERE SEQ_NAME = 'TUI_ID';

