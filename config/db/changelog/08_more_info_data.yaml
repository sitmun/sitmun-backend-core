              - column:
                  name: COD_LIST
                  value: "moreInfo.type"
              - column:
                  name: COD_VALUE
                  value: "URL"
              - column:
                  name: COD_SYSTEM
                  valueBoolean: false
              - column:
                  name: COD_DEFAULT
                  valueBoolean: false
