databaseChangeLog:
  - changeSet:
      id: 8
      author: sitmun
      changes:
        - update:
            tableName: STM_TSK_TYP
            columns:
              - column:
                  name: TTY_SPEC
                  valueClobFile: 03_task_types/06_MoreInformationTaskDefinition.json
            where: TTY_ID=6

  - changeSet:
      id: 9
      author: sitmun
      changes:
        - sql:
            sql: UPDATE STM_SEQUENCE SET SEQ_COUNT = SEQ_COUNT + 1 WHERE SEQ_NAME = 'COD_ID';
        - insert:
            tableName: STM_CODELIST
            columns:
              - column:
                  name: COD_ID
                  valueComputed: (SELECT SEQ_COUNT FROM STM_SEQUENCE WHERE SEQ_NAME = 'COD_ID')
