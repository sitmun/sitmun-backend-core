              - column:
                  name: COD_SYSTEM
                  valueBoolean: false
              - column:
                  name: COD_DEFAULT
                  valueBoolean: false
              - column:
                  name: COD_DESCRIPTION
                  value: "API"

        - sql:
            sql: UPDATE STM_SEQUENCE SET SEQ_COUNT = SEQ_COUNT + 1 WHERE SEQ_NAME = 'COD_ID';

